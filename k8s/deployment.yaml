apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoices-microservice
  namespace: statex-apps
  labels:
    app: invoices-microservice
    managed-by: codex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invoices-microservice
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: invoices-microservice
    spec:
      containers:
        - name: app
          image: localhost:5000/invoices-microservice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3204
              name: http
          envFrom:
            - configMapRef:
                name: invoices-microservice-config
            - secretRef:
                name: invoices-microservice-secret
          startupProbe:
            httpGet:
              path: /health
              port: 3204
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3204
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3204
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
