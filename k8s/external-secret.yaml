apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: invoices-microservice-secret
  namespace: statex-apps
  labels:
    app: invoices-microservice
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: invoices-microservice-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/prod/invoices-microservice
        property: DB_PASSWORD
    - secretKey: INVOICES_INTERNAL_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/invoices-microservice
        property: INVOICES_INTERNAL_SERVICE_TOKEN
    - secretKey: ORDERS_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/invoices-microservice
        property: ORDERS_SERVICE_TOKEN
    - secretKey: PAYMENTS_API_KEY
      remoteRef:
        key: secret/prod/invoices-microservice
        property: PAYMENTS_API_KEY
    - secretKey: NOTIFICATIONS_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/invoices-microservice
        property: NOTIFICATIONS_SERVICE_TOKEN
    - secretKey: INVOICE_SELLER_NAME
      remoteRef:
        key: secret/prod/invoices-microservice
        property: INVOICE_SELLER_NAME
    - secretKey: INVOICE_SELLER_ADDRESS
      remoteRef:
        key: secret/prod/invoices-microservice
        property: INVOICE_SELLER_ADDRESS
    - secretKey: INVOICE_SELLER_COMPANY_ID
      remoteRef:
        key: secret/prod/invoices-microservice
        property: INVOICE_SELLER_COMPANY_ID
    - secretKey: INVOICE_SELLER_TAX_ID
      remoteRef:
        key: secret/prod/invoices-microservice
        property: INVOICE_SELLER_TAX_ID
    - secretKey: INVOICE_SELLER_VAT_ID
      remoteRef:
        key: secret/prod/invoices-microservice
        property: INVOICE_SELLER_VAT_ID
    - secretKey: INVOICE_SELLER_EMAIL
      remoteRef:
        key: secret/prod/invoices-microservice
        property: INVOICE_SELLER_EMAIL
